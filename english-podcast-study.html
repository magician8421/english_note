<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>English Podcast Study</title>
  <style>
    :root{color-scheme:light;--bg:#f6f4ef;--panel:#fff;--ink:#202124;--muted:#6a6f73;--line:#ddd8cf;--accent:#245b57;--accent-soft:#e3efed;--mark:#fff0a8}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;line-height:1.7}.layout{min-height:100vh;display:grid;grid-template-columns:320px minmax(0,1fr)}aside{border-right:1px solid var(--line);background:#fbfaf7;padding:28px 22px;position:sticky;top:0;height:100vh}.brand{margin:0 0 22px;font-size:22px;line-height:1.2;letter-spacing:0}.hint{margin:0 0 18px;color:var(--muted);font-size:14px}.toc-button{width:100%;border:1px solid var(--accent);background:var(--accent-soft);color:var(--accent);padding:14px;border-radius:8px;text-align:left;font:inherit;font-weight:700;cursor:pointer}.toc-button:hover,.toc-button:focus-visible{outline:2px solid var(--accent);outline-offset:2px}main{padding:34px min(6vw,72px)}.reader-shell{max-width:920px;margin:0 auto}.toolbar{display:flex;align-items:center;justify-content:space-between;gap:14px;margin-bottom:18px;color:var(--muted);font-size:14px}.font-tools{display:flex;gap:8px;align-items:center}.tool-button{width:36px;height:34px;border:1px solid var(--line);background:var(--panel);border-radius:8px;cursor:pointer;color:var(--ink);font-weight:700}.tool-button:hover{border-color:var(--accent);color:var(--accent)}.empty{min-height:62vh;display:grid;place-items:center;border:1px dashed var(--line);border-radius:8px;background:rgba(255,255,255,.45);color:var(--muted);text-align:center;padding:24px}article{display:none;background:var(--panel);border:1px solid var(--line);border-radius:8px;padding:clamp(22px,4vw,46px);box-shadow:0 10px 30px rgba(36,32,25,.06)}article.is-visible{display:block}article h1{margin:0 0 8px;font-size:clamp(28px,4vw,44px);line-height:1.14;letter-spacing:0}.meta{margin:0 0 28px;color:var(--muted);font-size:14px}.transcript{font-size:var(--reader-size,18px)}.transcript p{margin:0 0 1.15em}.transcript .cue{display:inline-block;margin-bottom:1.1em;padding:4px 10px;border-radius:999px;background:var(--accent-soft);color:var(--accent);font-size:14px;font-weight:700}.transcript .affirmation{margin:.55em 0;padding-left:16px;border-left:3px solid var(--mark)}@media (max-width:820px){.layout{display:block}aside{position:static;height:auto;border-right:0;border-bottom:1px solid var(--line)}main{padding:22px 14px 38px}.toolbar{align-items:flex-start}}
  </style>
</head>
<body>
  <div class="layout">
    <aside>
      <h1 class="brand">English Podcast Study</h1>
      <p class="hint">目录</p>
      <button class="toc-button" type="button" id="openTranscript">MORNING MOTIVATION - cleaned for English study</button>
    </aside>
    <main>
      <div class="reader-shell">
        <div class="toolbar">
          <span id="status">点击左侧目录开始学习</span>
          <div class="font-tools" aria-label="Font size controls">
            <button class="tool-button" type="button" id="smaller" title="Smaller text">A-</button>
            <button class="tool-button" type="button" id="larger" title="Larger text">A+</button>
          </div>
        </div>
        <section class="empty" id="emptyState"><p>选择一篇逐字稿后，正文会显示在这里。</p></section>
        <article id="reader" aria-live="polite">
          <h1>MORNING MOTIVATION</h1>
          <p class="meta">Cleaned transcript for English study</p>
          <div class="transcript" id="transcript"></div>
        </article>
      </div>
    </main>
  </div>
  <script id="transcriptData" type="application/json">"[Music]\n\nGood morning, and welcome back to A Better You. I'm your host, Fernanda Ramirez.\n\nToday, I'm going to give you guys some morning inspiration and motivation to listen to whenever you need a little morning pick-me-up. Whether you're rolling out of bed, it's still dark out, and you need some inspiration to get up and actually go about your day, or maybe you have a test today, or a date, or something that you're nervous for and you need a little bit of a lift, some energy, I am channeling my energy through this podcast.\n\nWhether you're watching it on video, listening on Spotify, Apple, or whatever platform it is, through earphones or whatever, this episode is intended to be repeated and listened to right in the morning. As you're doing your makeup, making breakfast, getting your coffee ready, driving to work, driving to school, whatever it is, this podcast better be on.\n\nLet's just jump right into it.\n\nGood morning, you guys. Rise and shine. What a day to be alive. Honestly, take a moment of gratitude right now and just sit with that feeling. Even if you have not batted an eye at the fact that you are awake, you should be very grateful and thankful that another day is yet to happen.\n\nI think I can speak for all of us when I say that it is so easy to take for granted the days that we have and not live in the present moment. We're constantly thinking about the past: things we did, things we should have done better, things we could have done better, how we could have improved, how we could have done better on a test maybe, or made a relationship work, or made a friendship work, or achieved certain milestones that we wanted.\n\nOr we may spend our time thinking about the future. What will be? What will come out of what we're doing? Where will our relationships go? Will our dreams come true? You know, there are so many things to have anxiety over when looking forward, but the truth is, all we have is the present moment. We have today.\n\nIf we're feeling energized and happy today, if you're listening to this podcast and in this very moment you are feeling just an ounce better, maybe listening to me across the screen or through your earphones is giving you even a 10% little energy increase. That feeling that you have inside is the current reality. And knowing that our vibrations are literally rising as we speak, I think we can start the day on a good note.\n\nToday is a brand-new day for you to get inspired, for you to try something that you haven't done before. It is extremely easy for us to go about our days without really taking a moment to be intentional with how our days are going to go and how we're going to act during the day.\n\nI mean, sometimes I set the intention that I want to be a kinder person, or I want to be more helpful, or I want to be a little bit more disciplined, or I want to be more enthusiastic. Whatever it is, there are so many things that I want to be. For example, when I am setting intentions at the beginning of the year, I have a whole idea of me constructed, a self-image that I want to be, and it's easy to forget about that since you're not constantly brushing up on it.\n\nBut if you have a moment today or this morning, take a second to set an intention for the day. This word will be exactly how you set the day out to be. And remember, if you are the one looking for yellow cars, you will find yellow cars around you. So if you are setting the intention to find good things throughout your day, find positive things, be a positive person, look for the luck around you, look for the love around you, you will see those things. And not only will you see them, but you will attract them.\n\nThe quote that whatever you focus on grows is extremely true, and it is so powerful. I think we underestimate that sometimes, or at least I do. But the truth is, whenever I have something in mind, I can't seem to stop seeing it. I see it wherever I go. So knowing that this is something that psychologically happens to us, it's in our best interest to set the word of the day as early as we can.\n\nAnd even if that inspiration or motivation fizzles out after a few days, you can reset the intention, maybe with a different word the following few days, or pick a word for the week.\n\nI'm going to read out some daily intentions that you can use today. If any of these align with you, or you feel specifically called to one, take that sentence with you and try to embody it in every action that you do today.\n\nI'm going to read these intentions out as affirmation statements.\n\nI am grateful.\n\nI intend to lead by example.\n\nI will speak kindly to myself.\n\nI will be present.\n\nI accept myself as enough.\n\nI intend to be happy.\n\nI will be myself.\n\nI love myself unconditionally.\n\nI will build my resilience and stay motivated.\n\nI enjoy my creativity.\n\nI will find balance.\n\nI find joy in the world.\n\nI will fuel my body with healthy food.\n\nI will drink enough water today.\n\nI will have fun today.\n\nI will notice the beauty around me.\n\nI will stick up for my own beliefs.\n\nI will open my mind and my heart.\n\nI intend to move my body in ways that feel good.\n\nI intend to get the sleep my body deserves.\n\nI intend to practice self-care and treat my body with love and respect.\n\nToday, I will make conscious choices.\n\nI have the power and courage to make the best choices for myself and for my loved ones.\n\nI am stronger than my fears.\n\nI am resilient and strong, and I can handle anything that comes my way.\n\nThose are a few daily intentions that you can use to go about your day and really keep in the back of your mind. You can write one down on a sticky note. You can write it down in your Notes app. You can use it as your wallpaper, whatever it is.\n\nAs said on the Positive Planners.com, creating this intention will help you open your mind to opportunities throughout the day and impact how you approach future tasks.\n\nI absolutely love that. And again, I think it is so important to note that the minute you give space to these affirmations, the minute you start to look out for them, and the minute you have that openness, not only open-mindedness but that receiving energy, you will attract all the things that you are saying.\n\nIt is so important that today you go about your day looking for the positive things around you, looking for the little bits of joy, whether that be the sun peeking out of the sky, the flowers blooming on the sidewalk, or maybe you see some kids laughing and playing.\n\nInstead of going throughout your day feeling some type of way, feeling angry, feeling whatever it is that you feel, at least for the time that you're listening to this podcast, or maybe if you're on a walk or you're working out, at least for some time during the day, let go of all those thoughts, the past and future anxieties and doubts. Truly just be present and allow yourself to enjoy the fact that you're alive, the fact that you can actually experience all these things.\n\nAnd even though all of us have individual lives that are extremely different, and people could be walking around with traumas and dilemmas and problems that you don't even know about, at least be the person who can uplift and inspire other people, even if it's just for five minutes. We all need a little bit of positivity in our lives. And if you can be that person for someone, not only are you doing them a service, but you're doing a service for yourself.\n\nI truly believe in good karma. The more good that you put out, the more you are going to receive. Keeping that positive and open energy with your daily intentions will absolutely help the opportunities you are looking for come your way.\n\nNot only is setting an intention for your day a phenomenal way to start, but I also recommend taking a little look within and even picking out three things that you're grateful for today. I've mentioned this in a few podcasts, and I have a lot of podcasts on vibrations, but when you align yourself with the vibration of gratitude, it is the highest frequency that you can have. And those opportunities that you so wish and long for, that are on that same vibration, will immediately align to you.\n\nSuddenly the doors will open to those things that you want. People can give you opportunities that you weren't expecting before, and that can only happen if you have that open energy.\n\nEven if you're dealing with insecurities today or you aren't feeling the most confident, go about your day feeling confident in who you are, in what your plan is, and know that you're a unique individual person, and there is no one else on the planet like you.\n\nIt is important to go about these intentions without saying the words \"I won't,\" and to keep them in a more positive light by saying things that you will be doing or things that are focused on a truth within the present moment.\n\nThe energy for today, for me and for you, is to go about our days without any insecurities blocking our minds, to go about our day confidently, and to shine our most authentic and confident energy.\n\nIf it is early in the morning for you, don't check social media yet. You don't have to do that. We all know that checking social media in the morning is not the best thing that we can do. It is constantly a game of comparison, and you know that comparison is the thief of joy. There is absolutely no point in that.\n\nIf you're dealing with insecurities, throw those out the door, at least for the day or the time being, and truly just let yourself enjoy being you.\n\nSometimes I am my worst critic, and I can be extremely harsh on myself, nitpicking almost every little thing that a viewer, or one of my friends, or even a family member wouldn't even consider.\n\nI even saw this girl on TikTok make a video of herself where she was standing in front of the camera and she said, \"I bet you can't guess what my insecurity is.\" And after like five minutes, when literally nothing came to my mind, she explained what it was, and it was completely different from what everybody in the comments was thinking.\n\nThat in itself just showed that whatever you are hyper-fixating on, if it is physical or even something that is not physical, and you think that people are thinking it about you or people know this about you, trust me when I say people are not thinking about you in that way as much as you think they are. People are not constantly nitpicking you, and everybody is so worried about themselves that they do not have time to focus on you.\n\nAnd in that same light, I want to say, if you are the one being judgmental of other people, let those things go. It is not a trait that we want to have. It is not a trait that will open any doors for us or attract more opportunities to ourselves. There's absolutely no point in being judgmental, and if it does not affect your life, it should not take up space in your mind.\n\nI saved a quote on my phone this morning that says, \"Get out of bed. Do the things. Own your life.\" And as simple as that little graphic was, it is something that I want to put on my phone, on my wall. I want to write it down. I want to scream it from the rooftops, and I want to really affirm it into your head.\n\nToday, we are not laying in our beds rotting away, as they say on TikTok. We do not need to go on our phones and live through other people and just watch other people live their lives. You have the power. You have the body. If you are able-bodied, in fact, that is even something more to be grateful for.\n\nDo one thing today that makes you feel better. If it's a little self-care ritual, or maybe you want to talk to a friend, get a little bit of socializing, a little bit of interaction in there. Or maybe you're going to do something even more than that. Maybe after work, after school, or if you have a free day today, you can sign up for a rock climbing class. You can sign up for a pottery class. You can go to a workout class. Breaking a little sweat never hurt nobody.\n\nWhat I'm trying to say is that you have the power to get after your goals and create your dream life today. Nobody is going to do it for you. And if you see other people around you doing the things that you want to do, there is no reason why you can't either.\n\nThe least we can do is just put some effort in, try even 10% harder than we did in the past, and get that momentum building. Whether it's a habit or a skill, or you want to start content creation maybe, or you want to start working out, or you want to start eating healthy, all it takes is starting today.\n\nI assure you, it'll give you the dopamine rush that you've been looking for. These habits and goals that you have are just a matter of time before they become a lifestyle for you.\n\nToday, we act like the person that we want to become. We embody that energy and recognize that we live in a universe of opportunities. Those dreams that you have would not be placed in you if it wasn't for a reason. And if you look around you, I'm sure there are a bunch of things, people, scenarios, and positions that you're in that you used to want and now you have.\n\nI also want to note that you should be grateful for the things that you have currently that you always wanted, because it is so easy for humans to get accustomed to the way things are and just act like it is no big deal.\n\nI know for myself, if I knew that I would be in this position a few years ago, I would be absolutely ecstatic, and it's so easy for me to go about my days not realizing or not being grateful for even the simplest of things.\n\nAnd having that said, I want to say that I am so grateful for the life that I've created. I'm proud of myself, and it's also okay to say those things. It is okay to recognize your own worth, and your number one cheerleader is yourself.\n\nPeople will treat you the way that you treat you. So set a good example for the people around you and the people that you want to attract. It genuinely starts with you.\n\nAnd in some situations, people may call you delusional for thinking and knowing that all the things that you want are coming your way, and that you're abundant, and that you're saying all these affirmations. People can say, \"She's a little bit delulu.\" But at the end of the day, you are the one that's going to achieve your dream life, and nobody created their dream life by waiting for it to come to them.\n\nEverything you desire desires you back. Remember that access to your energy is a privilege, and to protect your energy throughout the day, do not engage in things that are not worth your time: drama, petty fights, low-vibrational negative energy.\n\nStay away from situations and people that make you feel that way, because it is only doing harm to you. Misery loves company, and you do not need to be that person.\n\nThere is no one else like you. You are one of a kind. Your interests, your talents, and your knowledge are what make you you. It's what makes you special. It's what makes you stand out. It's what makes people want to be your friend. And ultimately, it's what gives you that glow and that aura that shines through your body, through your skin, through your little energy field going on. That is what people can feel.\n\nToday, maybe you can also set the intention to go about your day doing more of your favorite things, welcoming little things that you know will make you feel better. It could be listening to your favorite playlist. It could be getting a little drink, or a little sweet treat, or some food. It could be wearing your favorite outfit, or picking something that embodies the way that you feel within, showcasing your personality through your style, through your clothing.\n\nMaybe it's seeing a friend today. It can be giving eye contact and smiles to people on the street. It could be going on a little nature walk and being out in nature. Genuinely, a side note: seeing the color green is actually proven to lower cortisol levels and lower your stress, and same with tree hugging.\n\nI read online yesterday that it actually raises your vibrations and makes you feel better, and that inspired me. It made me want to go hug a tree.\n\nSay it with me, everyone: I am young, and I am learning how to live. We are all going through this experience for the first time, so give yourself grace. Give the people around you grace.\n\nAnd today, I want you to go about your day feeling a little bit more compassionate for your inner child and for the inner child of others.\n\nOne of the signs of healthy mental health is being adaptable and being open-minded. That means that if other people today have some sort of issues going on, have some sort of stress, or are making things even a little bit difficult for you, try your best to be adaptable, not be so rigid or feel stuck in those emotions of anger and stress.\n\nThings will work out the way that they are supposed to. And ultimately, just remind yourself that everybody is out here doing the best they can. You are the youngest that you're ever going to be right now, and so for that reason, treat your body with respect. Do things today that will make you feel better and that will actually benefit your wellness and mental health. Your future self will 100% thank you for that.\n\nAnd also today, if you have the opportunity to do something new, take that opportunity and make that happen. Doing new things is what creates memories, and you are able to create literal core memories today if you choose to.\n\nIf today you have anything to celebrate, acknowledge and celebrate those accomplishments, and do that for other people around you as well. Spread that positivity. Spread that kindness.\n\nAnd tonight, before you go to bed, you can reflect on this day, and you're going to be so grateful that you took my advice here, that you took this inspiration and this energy, and you're going to be like, wow, today was a gorgeous day. Today was beautiful.\n\nEvery night before I go to bed, I actually do that, and I think of three things that went well today, three things I could have improved, and three things that I am grateful for. And it genuinely makes me fall asleep like a baby because my mental health is clear.\n\nI'm going to end off by giving you a last little speech and then going into some of the affirmations that I have in my life binder currently.\n\nThat being said, I know I've reiterated this throughout the whole episode, but truly, be grateful for today. I'm grateful that you're listening to this. Think about the loved ones that you have around you, the memories that you've experienced, the good ones and the bad. It has shaped you into who you are today, and it's only going to get better from here.\n\nThere is a quote that someone said, and it says, \"I didn't come this far just to come this far.\" Cheesy, but it's true. You have so much life to live. You never know when things can change. And also, having that in mind, sit with this version of yourself. I need to do this more often, even, and just look around and say, wow, I'm grateful for where I am. I have the best people around me.\n\nBecause things will not be the same in five years. Things won't even be the same in three months. I know for myself, I'm grateful to be alive at the same time that I am with my friends, with my family, with you guys. Genuinely, I wouldn't want to have it any other way.\n\nAnd lastly, see the beauty in the things around you. The beauty you see in anything is a reflection of the beauty in you.\n\nI'm going to say some of my affirmations, and you're more than welcome to repeat them with me after.\n\nI follow my dreams with passion and certainty.\n\nI feel so powerful, so alive, and so connected.\n\nI no longer hold fear, stress, or anxiety.\n\nI am full of gratitude, prosperity, and abundance.\n\nI am happy and full of life.\n\nI feel lighter every day.\n\nI prioritize my responsibilities and manage my time effectively.\n\nI know what I deserve, and I am confident in myself.\n\nI choose to see the beauty and goodness in others.\n\nI am wealthy and a money magnet.\n\nI know what I want out of life, and I do everything in my power to make that happen.\n\nCreativity and inspiration flow throughout my body.\n\nI prioritize my health and well-being.\n\nI am a beautiful and unique individual with a purpose that is unique to me.\n\nI create a life full of balance and harmony.\n\nI believe in my ability to effectively express my thoughts and ideas.\n\nI am reliable, dependable, and I take ownership of my actions.\n\nEverything about me is beautiful inside and out.\n\nI am healthy, and my body works for me every day.\n\nMy family and friends are happy, healthy, and wealthy.\n\nAnd lastly, no one is you, and that is your power.\n\nAnyways, you guys, I'm glad you stuck with me through this episode. I hope you are feeling energized, great, wonderful. Say thank you to your body right now, and thank each individual cell in your body for keeping you healthy, alive, and well.\n\nAnd I hope that today you go about your day genuinely having the most positive, enthusiastic, and lucky day that you've had in a while. You deserve good things, and you deserve the happiness that you have. No one can take that away from you. And don't let anyone make you feel bad about the positive feelings that you have. Those feelings are true, and if that's how you're feeling in the present moment, that's you. That's life. That's how it is.\n\nThank you for listening to this episode. I'm grateful that you clicked on it. I love you, and I will see you guys soon.\n"</script>
  <script>
    const transcriptText=JSON.parse(document.querySelector("#transcriptData").textContent);
    const openTranscript=document.querySelector("#openTranscript");
    const emptyState=document.querySelector("#emptyState");
    const reader=document.querySelector("#reader");
    const statusText=document.querySelector("#status");
    const transcript=document.querySelector("#transcript");
    const smaller=document.querySelector("#smaller");
    const larger=document.querySelector("#larger");
    let readerSize=18;
    const affirmationStart=/^(I am|I intend|I will|I accept|I enjoy|I find|I have|I follow|I feel|I no longer|I prioritize|I know|I choose|Creativity|Everything about me|My family|And lastly, no one is you)/;
    function renderTranscript(){
      transcript.innerHTML="";
      transcriptText.split(/\n{2,}/).map(part=>part.trim()).filter(Boolean).forEach(part=>{
        const p=document.createElement("p");
        if(part==="[Music]"){
          const span=document.createElement("span");
          span.className="cue";
          span.textContent=part;
          p.append(span);
        }else{
          p.textContent=part;
          if(affirmationStart.test(part)) p.className="affirmation";
        }
        transcript.append(p);
      });
    }
    openTranscript.addEventListener("click",()=>{
      if(!transcript.childElementCount) renderTranscript();
      emptyState.style.display="none";
      reader.classList.add("is-visible");
      statusText.textContent="正在阅读: MORNING MOTIVATION - cleaned for English study";
      reader.scrollIntoView({behavior:"smooth",block:"start"});
    });
    smaller.addEventListener("click",()=>{readerSize=Math.max(15,readerSize-1);transcript.style.setProperty("--reader-size",readerSize+"px")});
    larger.addEventListener("click",()=>{readerSize=Math.min(24,readerSize+1);transcript.style.setProperty("--reader-size",readerSize+"px")});
  </script>
</body>
</html>
